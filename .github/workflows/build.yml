name: Build

on:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Ensure scripts are executable
        run: chmod +x .vscode/*.sh || true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.20

      - uses: pnpm/action-setup@v4

      - name: pnpm install
        run: pnpm install --frozen-lockfile

      - name: setup (.vscode/setup.sh)
        run: ./.vscode/setup.sh

      - name: cli-build (.vscode/build.sh)
        run: ./.vscode/build.sh

      - name: Create artifact
        uses: actions/upload-artifact@v4
        with:
          name: Hydra.zip
          path: |
            dist/Hydra.zip
